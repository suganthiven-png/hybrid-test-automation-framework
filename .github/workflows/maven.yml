name: Maven CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'

      - name: Build and test with Maven
        run: mvn -B -DskipTests=false clean test

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports

      - name: Upload JUnit test results to GitHub (test-report)
        if: always()
        uses: mikeal/publish-to-github-action@v1
        with:
          # This action is a placeholder to indicate uploading reports. Replace with a step integrating any junit-to-gh or comment action if desired.
          args: ''
