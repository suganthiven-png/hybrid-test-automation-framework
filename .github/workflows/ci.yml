publish-report:
  name: Publish TestNG Report to GitHub Pages
  needs: build-and-test
  runs-on: ubuntu-latest
  if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

  environment:
    name: github-pages
    url: ${{ steps.deployment.outputs.page_url }}

  steps:
    - name: Download test-output artifact
      uses: actions/download-artifact@v4
      with:
        name: test-output
        path: ./artifacts

    - name: Ensure TestNG report exists
      run: |
        if [ ! -f "./artifacts/test-output/index.html" ]; then
          echo "TestNG report not found, aborting publish."
          ls -R ./artifacts || true
          exit 1
        fi

    - name: Configure Pages
      uses: actions/configure-pages@v5

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: ./artifacts/test-output

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
